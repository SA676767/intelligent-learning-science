<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelligentLearning | Master your beliefs</title>
    <style>
        :root {
            --bg: #f3f6f9; --surface: #ffffff; --border: #e1e8ed;
            --accent: #007bff; --century-purple: #745af2;
            --text-main: #24292e; --text-muted: #6a737d;
            --gold: #fbc02d; --success: #28a745;
        }
        body { background: var(--bg); color: var(--text-main); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Auth Screen */
        #auth-screen { position: fixed; inset: 0; background: var(--century-purple); z-index: 3000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; padding: 40px; border-radius: 20px; width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        /* Layout */
        .sidebar { width: 260px; background: white; border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
        .viewport { flex: 1; padding: 40px; overflow-y: auto; }
        
        /* Category Tabs */
        .category-bar { display: flex; gap: 10px; margin-bottom: 30px; overflow-x: auto; padding-bottom: 10px; }
        .cat-tab { padding: 8px 16px; background: white; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 0.9rem; font-weight: 600; transition: 0.2s; }
        .cat-tab.active { background: var(--century-purple); color: white; border-color: var(--century-purple); }

        /* Nugget Grid */
        .nugget-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .nugget-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); cursor: pointer; transition: 0.2s; position: relative; }
        .nugget-card:hover { transform: translateY(-5px); border-color: var(--century-purple); }
        .nugget-status { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; display: block; }

        /* Award Shop */
        .award-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; margin-top: 20px; }
        .award-icon { font-size: 2rem; background: #eee; padding: 10px; border-radius: 10px; text-align: center; opacity: 0.3; transition: 0.3s; }
        .award-icon.unlocked { opacity: 1; background: #fff5d7; border: 2px solid var(--gold); transform: scale(1.1); }
        .box-roll { background: linear-gradient(135deg, var(--century-purple), #a371f7); color: white; padding: 40px; border-radius: 15px; text-align: center; cursor: pointer; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(116, 90, 242, 0.3); }

        /* Global UI */
        .stat-box { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); }
        .nav-btn { width: 100%; padding: 12px; margin: 5px 0; border: none; background: none; text-align: left; cursor: pointer; font-weight: 600; border-radius: 8px; color: var(--text-muted); }
        .nav-btn.active { background: rgba(116, 90, 242, 0.1); color: var(--century-purple); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; }
        
        #content-overlay { display: none; position: fixed; inset: 0; background: white; z-index: 2000; padding: 40px; flex-direction: column; align-items: center; justify-content: center; }
        .opt-btn { width: 100%; padding: 18px; margin: 10px 0; border-radius: 10px; border: 1px solid var(--border); cursor: pointer; font-size: 1.1rem; text-align: left; background: #f8f9fa; }
    </style>
</head>

                slides: [
                    {h: "B2.5 Aerobic Respiration", p: "After this topic you will be able to describe the process of aerobic respiration and explain the role of mitochondria in cells."},
                    {h: "What is Respiration?", p: "Respiration is a chemical reaction that happens in every living cell. It is the process of releasing energy from glucose. It is NOT the same as breathing!"},

                slides: [
                    {h: "B2.6 Anaerobic Respiration", p: "After this topic you will be able to describe the process of anaerobic respiration in humans and microorganisms, and explain the concept of oxygen debt."},
                    {h: "What is Anaerobic Respiration?", p: "Anaerobic means 'without oxygen'. This happens when your body cannot supply enough oxygen to your muscles fast enough, such as during a sprint."},
                    {h: "In Humans (Muscles)", p: "Glucose -> Lactic Acid (+ little energy). Lactic acid builds up in muscles, causing a painful burning sensation and cramps."},
                    {h: "Oxygen Debt", p: "After exercise, you keep breathing deeply to get extra oxygen to break down the lactic acid. This 'extra' oxygen needed is called oxygen debt."},
                    {h: "In Microorganisms (Fermentation)", p: "Yeast and some plants respire anaerobically differently: Glucose -> Ethanol + Carbon Dioxide. This is called fermentation."},
                    {h: "Why use Anaerobic?", p: "It releases much less energy than aerobic respiration, but it happens much faster. It's a 'last resort' for survival or high intensity."}

            "B2.7": {
                title: "B2.7 Food Chains and Webs",
                slides: [
                    {h: "B2.7 Food Chains and Webs", p: "After this topic you will be able to describe how energy is transferred through food chains and explain the difference between a food chain and a food web."},
                    {h: "Producers and Consumers", p: "Every food chain starts with a Producer (usually a green plant) that makes its own food via photosynthesis. Animals that eat these plants are Consumers."},
                    {h: "The Flow of Energy", p: "Arrows in a food chain represent the flow of energy. If an arrow points from a leaf to a caterpillar, it means the energy in the leaf is moving into the caterpillar."},
                    {h: "Trophic Levels", p: "1. Producer (Plant) -> 2. Primary Consumer (Herbivore) -> 3. Secondary Consumer (Carnivore) -> 4. Tertiary Consumer (Top Predator)."},
                    {h: "Food Webs", p: "Most animals eat more than one thing. A food web is a network of many interconnected food chains, showing how energy flows through an entire ecosystem."},
                    {h: "Interdependence", p: "Organisms in a web depend on each other. If one species (like a predator) is removed, the population of its prey will likely increase, which then affects the plants they eat."}

            "B2.8": {
                title: "B2.8 Disruption to Food Chains",
                slides: [
                    {h: "B2.8 Disruption to Food Chains", p: "After this topic you will be able to explain how changes in an ecosystem (like toxic materials or population changes) affect food webs."},
                    {h: "Interdependence", p: "All organisms in a food web depend on each other. If the population of one organism changes, it creates a 'ripple effect' throughout the entire web."},
                    {h: "Bioaccumulation", p: "This happens when toxins (like pesticides or mercury) build up in a food chain. Producers take in a small amount, but the top predator ends up with a lethal dose because they eat so many prey."},
                    {h: "Bioamplification", p: "As you move up the food chain, the concentration of toxins increases at each level. This often leads to death or infertility in top predators like eagles or sharks."},
                    {h: "Invasive Species", p: "If a new species is introduced, it may have no natural predators. It will eat the food of native species, causing their populations to crash."},
                    {h: "Environmental Changes", p: "Factors like global warming, deforestation, or water pollution can destroy habitats, removing the 'Producers' and causing the entire web to collapse."}

            "B2.9": {
                title: "B2.9 Ecosystems",
                slides: [
                    {h: "B2.9 Ecosystems", p: "After this topic you will be able to define an ecosystem and distinguish between biotic and abiotic factors."},
                    {h: "What is an Ecosystem?", p: "An ecosystem consists of all the living organisms (community) in a particular area, interacting with the non-living parts of their environment."},
                    {h: "Biotic Factors", p: "Biotic means 'living'. These factors include food availability, new predators, and diseases."},
                    {h: "Abiotic Factors", p: "Abiotic means 'non-living'. These are physical and chemical parts of the environment, such as temperature, light intensity, soil pH, and water levels."},
                    {h: "Niche", p: "A niche is the particular place or role that an organism has within an ecosystem. No two species can occupy the exact same niche for long without competition."},

                    {h: "B3.1 Competition & Adaptation", p: "After this topic you will be able to describe the factors organisms compete for and explain how adaptations help them survive."},
                    {h: "Competition", p: "Resources in an ecosystem are limited. Organisms must compete to survive. Plants compete for light, water, space, and minerals. Animals compete for food, water, mates, and territory."},
                    {h: "Adaptations", p: "An adaptation is a characteristic that helps an organism survive in its environment. These can be structural (body parts), behavioral (actions), or functional (internal processes)."},

                slides: [
                    {h: "B3.2 Adapting to Change", p: "After this topic you will be able to explain how changes in the environment affect populations and describe the causes of extinction."},
                    {h: "Environmental Change", p: "Environments are not constant. Changes can be daily (tides), seasonal (winter), or long-term (climate change). Organisms must adapt to these changes to survive."},
                    {h: "Natural Selection", p: "If an environment changes, individuals with helpful variations are more likely to survive. This 'selection pressure' drives evolution over many generations."},
                    {h: "The Peppered Moth", p: "A famous example of rapid change. During the Industrial Revolution, soot turned trees black. Darker moths survived better than light ones because they were camouflaged from birds."},

                    {h: "What is Variation?", p: "Variation refers to the differences that exist between individuals of the same species. It is why you look different from your friends and even your siblings."},

                    {h: "Discontinuous Variation", p: "This is variation that can only result in specific, separate categories. There are no 'in-betweens'. Examples: Blood group, eye color, or whether you can roll your tongue."},
                    {h: "Continuous Variation", p: "This is variation that can take any value within a range. It is usually measured with a number. Examples: Height, body mass, leaf length, or heart rate."},

            slides: [

                {h: "Boiling Points", p: "Distillation relies on different substances having different boiling points. The substance with the lowest boiling point evaporates first."},

    let currentUser = null;
    let userData = { coins: 0, streak: 0, awards: [], mastered: [] };
    let currentCategory = "Activate 2";

    function handleAuth() {
        const name = document.getElementById('user-input').value.trim();
        if(!name) return alert("Please enter a username.");
        currentUser = name;
        const saved = localStorage.getItem('aegis_final_' + name);
        userData = saved ? JSON.parse(saved) : { coins: 0, streak: 0, awards: [], mastered: [] };
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('display-name').innerText = currentUser;
        renderTabs();
        updateUI();
        renderPath();
    }

    function save() {
        if(currentUser) localStorage.setItem('aegis_final_' + currentUser, JSON.stringify(userData));
    }

    function renderTabs() {
        const container = document.getElementById('category-tabs');
        container.innerHTML = "";
        Object.keys(masteryData).forEach(cat => {
            const btn = document.createElement('div');
            btn.className = `cat-tab ${cat === currentCategory ? 'active' : ''}`;
            btn.innerText = cat;
            btn.onclick = () => { currentCategory = cat; renderTabs(); renderPath(); };
            container.appendChild(btn);
        });
    }

    function renderPath() {
        const grid = document.getElementById('path-grid');
        grid.innerHTML = "";
        const nuggets = masteryData[currentCategory];
        for(let id in nuggets) {
            const isMastered = userData.mastered.includes(id);
            const card = document.createElement('div');
            card.className = "nugget-card";
            card.innerHTML = `
                <span class="nugget-status">${isMastered ? "✅ Mastered" : "🔥 Ready"}</span>
                <h3>${id}</h3>
                <p>${nuggets[id].title}</p>
            `;
            card.onclick = () => startNugget(id);
            grid.appendChild(card);
        }
    }

    function startNugget(id) {
        document.getElementById('content-overlay').style.display = 'flex';
        const nugget = masteryData[currentCategory][id];
        if (nugget.slides && nugget.slides.length > 0) {
            showSlide(id, 0);
        } else {
            showQuestion(id, 0);
        }
    }

    function showSlide(id, slideIdx) {
        const nugget = masteryData[currentCategory][id];
        const slide = nugget.slides[slideIdx];
        const isLast = slideIdx === nugget.slides.length - 1;

        document.getElementById('quiz-area').innerHTML = `
            <h1>${slide.h}</h1>
            <p style="font-size: 1.2rem; margin: 20px 0;">${slide.p}</p>
            <button class="nav-btn" style="background: var(--century-purple); color: white; text-align: center;" 
                onclick="${isLast ? `showQuestion('${id}', 0)` : `showSlide('${id}', ${slideIdx + 1})`}">
                ${isLast ? "Start Quiz" : "Next Slide"}
            </button>
        `;
    }

    function showQuestion(id, qIdx) {
        const nugget = masteryData[currentCategory][id];
        const q = nugget.quiz[qIdx];
        document.getElementById('quiz-area').innerHTML = `
            <p style="color:var(--century-purple); font-weight:bold;">Question ${qIdx + 1} of ${nugget.quiz.length}</p>
            <h2 style="font-size: 1.8rem; margin-bottom: 30px;">${q.q}</h2>
            ${q.o.map((opt, i) => `<button class="opt-btn" onclick="answer('${id}', ${qIdx}, ${i})">${opt}</button>`).join('')}
        `;
    }

    function answer(id, qIdx, choice) {
        const nugget = masteryData[currentCategory][id];
        const correct = nugget.quiz[qIdx].a;

        if(choice === correct) {
            if (qIdx === nugget.quiz.length - 1) {
                // Finished whole quiz
                userData.coins += 10;
                userData.streak++;
                if(!userData.mastered.includes(id)) userData.mastered.push(id);
                alert("Nugget Mastered! +10 Coins");
                closeOverlay();
            } else {
                showQuestion(id, qIdx + 1);
            }
        } else {
            userData.streak = 0;
            alert("Incorrect. Restarting nugget.");
            closeOverlay();
        }
        save();
        updateUI();
        renderPath();
    }

    function closeOverlay() {
        document.getElementById('content-overlay').style.display = 'none';
    }

    function rollAward() {
        if(userData.coins < 25) return alert("Need 25 coins!");
        userData.coins -= 25;
        const anim = document.getElementById('roll-animation');
        let counter = 0;
        const interval = setInterval(() => {
            anim.innerText = AWARDS[Math.floor(Math.random() * AWARDS.length)];
            counter++;
            if(counter > 15) {
                clearInterval(interval);
                const prize = AWARDS[Math.floor(Math.random() * AWARDS.length)];
                anim.innerText = prize;
                if(!userData.awards.includes(prize)) userData.awards.push(prize);
                save();
                updateUI();
            }
        }, 80);
    }

    function showSection(id) {
        ['path', 'shop', 'awards'].forEach(s => document.getElementById('section-'+s).style.display = 'none');
        document.getElementById('section-'+id).style.display = 'block';
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('nav-'+id).classList.add('active');
    }

    function updateUI() {
        document.getElementById('coin-val').innerText = userData.coins;
        document.getElementById('streak-val').innerText = userData.streak;
        const div = document.getElementById('award-display');
        div.innerHTML = "";
        AWARDS.forEach(a => {
            const span = document.createElement('div');
            span.className = "award-icon" + (userData.awards.includes(a) ? " unlocked" : "");
            span.innerText = a;
            div.appendChild(span);
        });
    }
